<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded TempBox</title>
    <style>
        /* Reset margins to make the iframe fill the screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            background-color: #ffffff;
        }

        /* Container to hold the iframe and the overlay */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* The embedded site */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* The Overlay Blocker 
           Adjust the bottom, right, width, and height values if the watermark shifts 
        */
        .watermark-blocker {
            position: absolute;
            bottom: 15px; 
            right: 15px;  
            width: 160px; 
            height: 45px; 
            background-color: #ffffff; /* Matches the site's footer background */
            z-index: 9999;
            /* Prevents the user from clicking through the blocker to the watermark */
            pointer-events: auto; 
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe src="https://speedy-mail-drop.lovable.app/" title="TempBox"></iframe>
        
        <div class="watermark-blocker"></div>
    </div>

</body>
</html>
